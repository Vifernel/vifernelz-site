<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion - Vifernel Academy</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body style="background:#000;color:white;">

<div style="max-width:400px;margin:100px auto;padding:25px;background:#111;border-radius:15px;">

  <h2 style="text-align:center;color:#d4af37;margin-bottom:20px;">
    Vifernel Academy
  </h2>

  <input id="email" type="email" placeholder="Email"
  style="width:100%;padding:12px;margin:10px 0;border-radius:8px;color:black;background:white;">

  <input id="password" type="password" placeholder="Mot de passe"
  style="width:100%;padding:12px;margin:10px 0;border-radius:8px;color:black;background:white;">

  <button onclick="loginUser()"
    style="width:100%;padding:12px;background:#d4af37;color:black;font-weight:bold;border:none;border-radius:8px;">
    Se connecter
  </button>

  <button onclick="registerUser()"
    style="width:100%;padding:12px;margin-top:10px;background:#444;color:white;border:none;border-radius:8px;">
    Créer un compte
  </button>

  <p id="msg" style="text-align:center;margin-top:10px;"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDzr8uruU4UMNjCMa50zs4erHGXKN_fyQ",
  authDomain: "vifernel-trading-academy.firebaseapp.com",
  projectId: "vifernel-trading-academy",
  storageBucket: "vifernel-trading-academy.firebasestorage.app",
  messagingSenderId: "1000145148349",
  appId: "1:1000145148349:web:f0688610a67859a6999ad4",
  measurementId: "G-FR882HDS3K"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const msg = document.getElementById("msg");

/* =========================
   DEVICE ID SYSTEM
========================= */
function getDeviceId() {
  let id = localStorage.getItem("device_id");

  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }

  return id;
}

/* =========================
   LOGIN PRO (DEVICE LOCK)
========================= */

window.loginUser = function () {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const deviceId = getDeviceId();

  if (!email || !password) {
    msg.innerHTML = "❌ Veuillez remplir tous les champs";
    return;
  }

  msg.innerHTML = "⏳ Connexion...";

  signInWithEmailAndPassword(auth, email, password)
    .then(async (cred) => {

      const user = cred.user;

      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        msg.innerHTML = "❌ Profil introuvable";
        await signOut(auth);
        return;
      }

      const data = snap.data();

      // 🔒 DEVICE CHECK
      if (data.deviceId && data.deviceId !== deviceId) {
        msg.innerHTML = "⛔ Compte déjà utilisé sur un autre appareil";
        await signOut(auth);
        return;
      }

      // 🟢 SAVE DEVICE FIRST TIME LOGIN
      if (!data.deviceId) {
        await setDoc(ref, {
          deviceId: deviceId
        }, { merge: true });
      }

      msg.innerHTML = "Connexion réussie 🔥";

      setTimeout(() => {
        window.location.replace("academy.html");
      }, 1000);

    })
    .catch((error) => {
      msg.innerHTML = error.message;
    });
};


/* =========================
   REGISTER PRO (DEVICE SAVE) ✅ CORRIGÉ
========================= */

window.registerUser = function () {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const deviceId = getDeviceId();

  if (!email || !password) {
    msg.innerHTML = "❌ Veuillez remplir tous les champs";
    return;
  }

  msg.innerHTML = "⏳ Création du compte...";

  createUserWithEmailAndPassword(auth, email, password)
    .then(async (userCredential) => {

      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid,
        email: user.email,
        paid: false,
        plan: null,
        deviceId: deviceId,
        createdAt: new Date().toISOString()
      });

      msg.innerHTML = "Compte créé 🎉";

      setTimeout(() => {
        window.location.replace("academy.html");
      }, 1000);

    })
    .catch((error) => {
      msg.innerHTML = error.message;
    });
};

</script>

</body>
</html>
