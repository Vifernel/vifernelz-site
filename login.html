<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion - Vifernel Academy</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body style="background:#000;color:white;">

<div style="max-width:400px;margin:100px auto;padding:25px;background:#111;border-radius:15px;">

  <h2 style="text-align:center;color:#d4af37;margin-bottom:20px;">
    Académie Trading
  </h2>

  <input id="email" type="email" placeholder="Email"
    style="width:100%;padding:12px;margin:10px 0;border-radius:8px;">

  <input id="password" type="password" placeholder="Mot de passe"
    style="width:100%;padding:12px;margin:10px 0;border-radius:8px;">

  <button onclick="loginUser()"
    style="width:100%;padding:12px;background:#d4af37;color:black;font-weight:bold;border:none;border-radius:8px;">
    Se connecter
  </button>

  <button onclick="registerUser()"
    style="width:100%;padding:12px;margin-top:10px;background:#444;color:white;border:none;border-radius:8px;">
    Créer un compte
  </button>

  <p id="msg" style="text-align:center;margin-top:10px;"></p>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCDzr8uruU4UMNjCMa50zs4erHGXkN_fyQ",
    authDomain: "vifernel-trading-academy.firebaseapp.com",
    projectId: "vifernel-trading-academy",
    storageBucket: "vifernel-trading-academy.firebasestorage.app",
    messagingSenderId: "1000145148349",
    appId: "1:1000145148349:web:f0688610a67859a6999ad4",
    measurementId: "G-FR882HDS3K"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const msg = document.getElementById("msg");

  // 🔐 LOGIN
  window.loginUser = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        msg.innerHTML = "Connexion réussie 🔥";
        setTimeout(() => {
          window.location.replace("dashboard.html");
        }, 1000);
      })
      .catch((error) => {
        msg.innerHTML = error.message;
      });
  }

  // 🆕 REGISTER
  window.registerUser = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        msg.innerHTML = "Compte créé avec succès 🎉";
      })
      .catch((error) => {
        msg.innerHTML = error.message;
      });
  }
</script>

</body>
</html>
