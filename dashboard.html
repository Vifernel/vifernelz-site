<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDzr8uruU4UMNjCMa50zs4erHGXkN_fyQ",
  authDomain: "vifernel-trading-academy.firebaseapp.com",
  projectId: "vifernel-trading-academy",
  storageBucket: "vifernel-trading-academy.firebasestorage.app",
  messagingSenderId: "1000145148349",
  appId: "1:1000145148349:web:f0688610a67859a6999ad4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const planText = document.getElementById("planText");
const status = document.getElementById("status");

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    status.innerHTML = "❌ Profil introuvable";
    return;
  }

  const data = snap.data();
  const plan = data.plan || "FREE";

  planText.innerHTML = "Plan actif : <span class='badge'>" + plan + "</span>";

  // ACCÈS INTELLIGENT
  if (plan === "VIP") {
    document.querySelectorAll(".vvip, .vippp").forEach(el => el.classList.add("hidden"));
  }

  if (plan === "VVIP") {
    document.querySelectorAll(".vippp").forEach(el => el.classList.add("hidden"));
  }

  // BLOQUAGE SI NON PAYÉ
  if (!data.access || data.paid !== true) {
    document.body.innerHTML = `
      <div style="text-align:center;margin-top:100px;color:white;">
        <h1>⛔ Accès refusé</h1>
        <p>Abonnement requis</p>
      </div>
    `;
  }

});

window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>
