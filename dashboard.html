<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard - Vifernel Academy</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body style="background:#000;color:white;">

<!-- HEADER -->
<div style="text-align:center;padding:40px;">
  <h1 style="color:#d4af37;font-size:32px;">
    Bienvenue dans l’Académie Trading
  </h1>

  <p style="color:#aaa;margin-top:10px;">
    Accès réservé aux membres
  </p>

  <button onclick="logout()"
    style="margin-top:20px;padding:10px 20px;background:red;color:white;border:none;border-radius:8px;">
    Déconnexion
  </button>
</div>

<!-- MODULES -->
<div style="max-width:900px;margin:auto;padding:20px;">

  <h2 style="color:#d4af37;margin-bottom:15px;">Module 1 - Forex</h2>

  <div style="background:#111;padding:15px;border-radius:10px;margin-bottom:20px;">
    <iframe width="100%" height="400"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      allowfullscreen>
    </iframe>
  </div>

  <h2 style="color:#d4af37;margin-bottom:15px;">Module 2 - Crypto</h2>

  <div style="background:#111;padding:15px;border-radius:10px;">
    <iframe width="100%" height="400"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      allowfullscreen>
    </iframe>
  </div>

</div>

<!-- 🔒 FIREBASE AUTH PROPRE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCDzr8uruU4UMNjCMa50zs4erHGXkN_fyQ",
    authDomain: "vifernel-trading-academy.firebaseapp.com",
    projectId: "vifernel-trading-academy",
    storageBucket: "vifernel-trading-academy.firebasestorage.app",
    messagingSenderId: "1000145148349",
    appId: "1:1000145148349:web:f0688610a67859a6999ad4",
    measurementId: "G-FR882HDS3K"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 🔒 PROTECTION DU DASHBOARD
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.replace("login.html");
    }
  });

  // 🚪 LOGOUT
  window.logout = function () {
    signOut(auth).then(() => {
      window.location.replace("login.html");
    });
  };
</script>

</body>
</html>
