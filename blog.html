<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog - VifernelZ</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  background:#0b0f14;
  color:white;
  font-family:Poppins;
}

.blog-container {
  max-width: 900px;
  margin: 120px auto;
  padding: 20px;
}

.blog-title {
  font-size: 32px;
  margin-bottom: 30px;
}

.post {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
  transition: 0.3s;
}

.post:hover {
  transform: translateY(-5px);
}

.post img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

.post h2 {
  margin-bottom: 10px;
}

.post small {
  opacity: 0.7;
}
</style>

</head>

<body>

<div class="blog-container">

<h1 class="blog-title">📰 Blog VifernelZ</h1>

<div id="posts"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDzr8uruU4UMNjCMa50zs4erHGXkN_fyQ",
  authDomain: "vifernel-trading-academy.firebaseapp.com",
  projectId: "vifernel-trading-academy",
  storageBucket: "vifernel-trading-academy.firebasestorage.app",
  messagingSenderId: "1000145148349",
  appId: "1:1000145148349:web:f0688610a67859a6999ad4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const postsDiv = document.getElementById("posts");

async function loadPosts() {

  const querySnapshot = await getDocs(collection(db, "articles"));

  postsDiv.innerHTML = "";

  querySnapshot.forEach((doc) => {

    const data = doc.data();

    postsDiv.innerHTML += `
      <div class="post">
        <img src="${data.image || ''}" alt="">
        <h2>${data.title}</h2>
        <small>${data.date} • ${data.author}</small>
        <p>${data.content}</p>
      </div>
    `;

  });

}

loadPosts();

</script>

</body>
</html>
