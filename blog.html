<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog - VifernelZ</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: #0b0f14;
  color: #eaeaea;
}

/* CONTAINER */
.blog-container {
  max-width: 1000px;
  margin: 120px auto;
  padding: 20px;
}

/* TITLE */
.blog-title {
  font-size: 38px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 40px;
  color: #ffffff;
}

/* GRID POSTS */
#posts {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
}

/* CARD POST */
.post {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 18px;
  overflow: hidden;
  transition: 0.35s ease;
  backdrop-filter: blur(10px);
}

.post:hover {
  transform: translateY(-8px);
  border-color: rgba(212, 175, 55, 0.4);
}

/* IMAGE */
.post img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}

/* CONTENT */
.post h2 {
  font-size: 20px;
  margin: 15px;
  color: #fff;
}

.post small {
  display: block;
  margin: 0 15px;
  opacity: 0.7;
  font-size: 12px;
}

.post p {
  margin: 15px;
  font-size: 14px;
  line-height: 1.6;
  color: #b8c0cc;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .blog-title {
    font-size: 28px;
  }
}
  /* BACKGROUND ANIMÉ BLOG */
.animated-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
  background: linear-gradient(180deg, #05080d 0%, #0b0f14 50%, #070b10 100%);
}

/* ORBES */
.gradient-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.18;
  animation: floatSlow 18s ease-in-out infinite;
}

.orb-1 {
  width: 420px;
  height: 420px;
  background: #4c8dff;
  top: -120px;
  left: -120px;
}

.orb-2 {
  width: 340px;
  height: 340px;
  background: #6aa5ff;
  bottom: -100px;
  right: -80px;
  animation-delay: 4s;
}

.orb-3 {
  width: 260px;
  height: 260px;
  background: #3d74ff;
  top: 40%;
  left: 55%;
  animation-delay: 8s;
}

/* GRID */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.25;
}

/* PARTICLES */
.particles span {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(138, 180, 255, 0.5);
  border-radius: 50%;
  animation: particleMove 20s linear infinite;
}

.particles span:nth-child(1){ left:10%; animation-duration:20s; top:100%; }
.particles span:nth-child(2){ left:25%; animation-duration:24s; top:100%; }
.particles span:nth-child(3){ left:40%; animation-duration:18s; top:100%; }
.particles span:nth-child(4){ left:55%; animation-duration:26s; top:100%; }
.particles span:nth-child(5){ left:70%; animation-duration:22s; top:100%; }
.particles span:nth-child(6){ left:80%; animation-duration:28s; top:100%; }
.particles span:nth-child(7){ left:90%; animation-duration:19s; top:100%; }
.particles span:nth-child(8){ left:50%; animation-duration:30s; top:100%; }

/* ANIMATIONS */
@keyframes floatSlow {
  0% { transform: translateY(0); }
  50% { transform: translateY(-40px); }
  100% { transform: translateY(0); }
}

@keyframes particleMove {
  0% { transform: translateY(0); opacity:0; }
  15% { opacity:1; }
  100% { transform: translateY(-120vh); opacity:0; }
}
</style>

</head>

<body>
<div class="animated-bg">
  <div class="gradient-orb orb-1"></div>
  <div class="gradient-orb orb-2"></div>
  <div class="gradient-orb orb-3"></div>

  <div class="grid-overlay"></div>

  <div class="particles">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>
</div>
<div class="blog-container">

<h1 class="blog-title">📰 Blog VifernelZ</h1>

<div id="posts"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDzr8uruU4UMNjCMa50zs4erHGXkN_fyQ",
  authDomain: "vifernel-trading-academy.firebaseapp.com",
  projectId: "vifernel-trading-academy",
  storageBucket: "vifernel-trading-academy.firebasestorage.app",
  messagingSenderId: "1000145148349",
  appId: "1:1000145148349:web:f0688610a67859a6999ad4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const postsDiv = document.getElementById("posts");

async function loadPosts() {

  const querySnapshot = await getDocs(collection(db, "articles"));

  postsDiv.innerHTML = "";

  querySnapshot.forEach((doc) => {

    const data = doc.data();

    postsDiv.innerHTML += `
      <div class="post">
        <img src="${data.image || ''}" alt="">
        <h2>${data.title}</h2>
        <small>${data.date} • ${data.author}</small>
        <p>${data.content}</p>
      </div>
    `;

  });

}

loadPosts();

</script>

</body>
</html>
