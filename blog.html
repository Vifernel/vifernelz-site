<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog - VifernelZ</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: #0b0f14;
  color: #eaeaea;
}

/* CONTAINER */
.blog-container {
  max-width: 1000px;
  margin: 120px auto;
  padding: 20px;
}

/* TITLE */
.blog-title {
  font-size: 38px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 40px;
  color: #ffffff;
}

/* GRID POSTS */
#posts {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
}

/* CARD POST */
.post {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 18px;
  overflow: hidden;
  transition: 0.35s ease;
  backdrop-filter: blur(10px);
}

.post:hover {
  transform: translateY(-8px);
  border-color: rgba(212, 175, 55, 0.4);
}

/* IMAGE */
.post img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}

/* CONTENT */
.post h2 {
  font-size: 20px;
  margin: 15px;
  color: #fff;
}

.post small {
  display: block;
  margin: 0 15px;
  opacity: 0.7;
  font-size: 12px;
}

.post p {
  margin: 15px;
  font-size: 14px;
  line-height: 1.6;
  color: #b8c0cc;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .blog-title {
    font-size: 28px;
  }
}
</style>

</head>

<body>

<div class="blog-container">

<h1 class="blog-title">📰 Blog VifernelZ</h1>

<div id="posts"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDzr8uruU4UMNjCMa50zs4erHGXkN_fyQ",
  authDomain: "vifernel-trading-academy.firebaseapp.com",
  projectId: "vifernel-trading-academy",
  storageBucket: "vifernel-trading-academy.firebasestorage.app",
  messagingSenderId: "1000145148349",
  appId: "1:1000145148349:web:f0688610a67859a6999ad4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const postsDiv = document.getElementById("posts");

async function loadPosts() {

  const querySnapshot = await getDocs(collection(db, "articles"));

  postsDiv.innerHTML = "";

  querySnapshot.forEach((doc) => {

    const data = doc.data();

    postsDiv.innerHTML += `
      <div class="post">
        <img src="${data.image || ''}" alt="">
        <h2>${data.title}</h2>
        <small>${data.date} • ${data.author}</small>
        <p>${data.content}</p>
      </div>
    `;

  });

}

loadPosts();

</script>

</body>
</html>
