<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Blog - VifernelZ</title>

<style>
body{
  background:#0b0f14;
  color:white;
  font-family:Poppins;
}

.admin-box{
  max-width:600px;
  margin:100px auto;
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:15px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#d4af37;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.post{
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="admin-box">

<h2>🛠 Admin Blog</h2>

<input id="title" placeholder="Titre">
<input id="image" placeholder="Image URL">
<input id="author" placeholder="Auteur">
<textarea id="content" placeholder="Contenu"></textarea>

<button onclick="addPost()">Publier</button>

<p id="msg"></p>

<hr>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDzr8uruU4UMNjCMa50zs4erHGXkN_fyQ",
  authDomain: "vifernel-trading-academy.firebaseapp.com",
  projectId: "vifernel-trading-academy"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const msg = document.getElementById("msg");
const list = document.getElementById("list");

/* ================= CREATE ================= */
window.addPost = async function () {

  const title = document.getElementById("title").value;
  const image = document.getElementById("image").value;
  const author = document.getElementById("author").value;
  const content = document.getElementById("content").value;

  if (!title || !content) {
    msg.innerText = "❌ Titre + contenu obligatoires";
    return;
  }

  await addDoc(collection(db, "articles"), {
    title,
    image,
    author,
    content,
    date: new Date().toLocaleDateString()
  });

  msg.innerText = "✅ Article publié";

  loadPosts();
};

/* ================= READ ================= */
async function loadPosts() {

  const snap = await getDocs(collection(db, "articles"));

  list.innerHTML = "";

  snap.forEach((d) => {

    const data = d.data();

    list.innerHTML += `
      <div class="post">
        <h3>${data.title}</h3>
        <button onclick="deletePost('${d.id}')">Supprimer</button>
      </div>
    `;
  });
}

/* ================= DELETE ================= */
window.deletePost = async function(id){
  await deleteDoc(doc(db,"articles",id));
  loadPosts();
};

loadPosts();

</script>

</body>
</html>
