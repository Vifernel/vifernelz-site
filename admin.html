<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Blog - VifernelZ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{ box-sizing:border-box; }
body{
  background:#0b0f14;
  color:white;
  font-family:"Poppins",sans-serif;
  margin:0;
  min-height:100vh;
}

.admin-header{
  text-align:center; padding:50px 20px 10px;
}
.admin-header h1{ color:#d4af37; font-size:26px; }
.admin-header p{ color:#8c94a3; font-size:14px; margin-top:6px; }

.admin-box{
  max-width:520px;
  margin:30px auto 100px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(212,175,55,.25);
  padding:30px;
  border-radius:20px;
}

label{
  display:block; font-size:12px; color:#aaa; text-transform:uppercase;
  margin:14px 0 6px;
}
input, textarea{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.1);
  background:#10151d;
  color:#fff;
  font-size:15px;
  font-family:inherit;
  outline:none;
  transition:.3s ease;
}
input:focus, textarea:focus{ border-color:#d4af37; box-shadow:0 0 0 3px rgba(212,175,55,.15); }
textarea{ min-height:140px; resize:vertical; }

button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  margin-top:16px;
  transition:.3s ease;
  font-family:inherit;
}
.btn-primary{ background:linear-gradient(135deg,#d4af37,#b8860b); color:#0b0f14; }
.btn-primary:hover{ transform:translateY(-2px); box-shadow:0 14px 30px rgba(212,175,55,.3); }
.btn-secondary{ background:rgba(255,255,255,.06); color:#fff; border:1px solid rgba(255,255,255,.1); }
.btn-secondary:hover{ border-color:rgba(212,175,55,.4); color:#d4af37; }
.btn-danger{ background:rgba(255,80,80,.12); color:#ff8080; border:1px solid rgba(255,80,80,.3); width:auto; padding:8px 14px; font-size:12px; margin:6px 6px 0 0; display:inline-block; }
.btn-danger:hover{ background:#ff5c5c; color:#fff; }
.btn-edit{ background:rgba(255,255,255,.06); color:#fff; border:1px solid rgba(255,255,255,.1); width:auto; padding:8px 14px; font-size:12px; margin:6px 0 0 0; display:inline-block; }
.btn-edit:hover{ border-color:#d4af37; color:#d4af37; }

.msg{ text-align:center; margin-top:14px; font-size:13px; color:#f4e5a1; min-height:18px; }

.admin-badge{
  display:flex; justify-content:space-between; align-items:center;
  max-width:900px; margin:0 auto 20px; padding:0 20px;
}
.admin-badge span{
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 16px; border-radius:30px;
  background:rgba(212,175,55,.1); border:1px solid rgba(212,175,55,.3);
  color:#d4af37; font-size:13px; font-weight:600;
}
.logout-link{
  color:#ff8080; font-size:13px; cursor:pointer; font-weight:600;
}
.logout-link:hover{ text-decoration:underline; }

.posts-wrap{ max-width:900px; margin:0 auto 80px; padding:0 20px; }
.posts-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px;
}
.post-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  overflow:hidden;
}
.post-card img{ width:100%; height:140px; object-fit:cover; }
.post-card-body{ padding:16px; }
.post-card h3{ font-size:15px; color:#fff; margin-bottom:4px; }
.post-card p.meta{ font-size:12px; color:#8c94a3; margin-bottom:8px; }

.access-denied{ text-align:center; padding:120px 20px; }
.access-denied i{ font-size:40px; color:#ff5c5c; margin-bottom:16px; display:block; }

/* Modal d'édition */
.edit-modal{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
  z-index:999; align-items:center; justify-content:center; padding:20px;
}
.edit-modal.active{ display:flex; }
.edit-modal-content{
  max-width:520px; width:100%; background:#10151d;
  border:1px solid rgba(212,175,55,.25); border-radius:20px; padding:26px;
  max-height:90vh; overflow:auto;
}
</style>
</head>

<body>

<div class="admin-header">
  <h1>🛠 Admin Blog — VifernelZ</h1>
  <p>Gestion des articles (accès réservé)</p>
</div>

<!-- ============ ÉTAT : NON CONNECTÉ ============ -->
<div id="loginView" class="admin-box">
  <label>Email</label>
  <input id="loginEmail" type="email" placeholder="admin@vifernelz.com">
  <label>Mot de passe</label>
  <input id="loginPassword" type="password" placeholder="••••••••">
  <button class="btn-primary" onclick="doLogin()">Se connecter</button>
  <p class="msg" id="loginMsg"></p>
</div>

<!-- ============ ÉTAT : CONNECTÉ MAIS PAS ADMIN ============ -->
<div id="deniedView" class="access-denied" style="display:none;">
  <i class="fas fa-lock"></i>
  <h2>Accès refusé</h2>
  <p style="color:#8c94a3;">Ce compte n'a pas les droits d'administration du blog.</p>
  <span class="logout-link" onclick="doLogout()">Se déconnecter</span>
</div>

<!-- ============ ÉTAT : ADMIN CONNECTÉ ============ -->
<div id="adminView" style="display:none;">

  <div class="admin-badge">
    <span><i class="fas fa-shield-halved"></i> Connecté en admin</span>
    <span class="logout-link" onclick="doLogout()">Déconnexion</span>
  </div>

  <div class="admin-box">
    <label>Titre</label>
    <input id="title" placeholder="Titre de l'article">
    <label>Image (URL)</label>
    <input id="image" placeholder="https://...">
    <label>Auteur</label>
    <input id="author" placeholder="VifernelZ">
    <label>Contenu</label>
    <textarea id="content" placeholder="Contenu de l'article..."></textarea>
    <button class="btn-primary" onclick="addPost()">Publier l'article</button>
    <p class="msg" id="msg"></p>
  </div>

  <div class="posts-wrap">
    <div class="posts-grid" id="list"></div>
  </div>

</div>

<!-- ============ MODAL D'ÉDITION ============ -->
<div class="edit-modal" id="editModal">
  <div class="edit-modal-content">
    <h3 style="margin-bottom:16px;color:#fff;">Modifier l'article</h3>
    <label>Titre</label>
    <input id="editTitle">
    <label>Image (URL)</label>
    <input id="editImage">
    <label>Auteur</label>
    <input id="editAuthor">
    <label>Contenu</label>
    <textarea id="editContent"></textarea>
    <button class="btn-primary" onclick="saveEdit()">Enregistrer</button>
    <button class="btn-secondary" onclick="closeEdit()">Annuler</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged,
  setPersistence, browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDzr8uruU4UMNjCMa50zs4erHGXkN_fyQ",
  authDomain: "vifernel-trading-academy.firebaseapp.com",
  projectId: "vifernel-trading-academy",
  storageBucket: "vifernel-trading-academy.firebasestorage.app",
  messagingSenderId: "1000145148349",
  appId: "1:1000145148349:web:f0688610a67859a6999ad4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

setPersistence(auth, browserLocalPersistence).catch((e) => console.warn("Persistance:", e));

// ⚠️ Seul ce compte (créé dans Firebase Authentication) a accès au panel.
// Ce n'est qu'une vérification d'AFFICHAGE — la vraie protection contre
// l'écriture/suppression doit être faite via les règles Firestore
// (voir les instructions fournies avec ce fichier).
const ADMIN_EMAIL = "contact@vifernelz.com";

const loginView = document.getElementById("loginView");
const deniedView = document.getElementById("deniedView");
const adminView = document.getElementById("adminView");
const loginMsg = document.getElementById("loginMsg");
const msg = document.getElementById("msg");
const list = document.getElementById("list");

let editingId = null;

onAuthStateChanged(auth, (user) => {
  loginView.style.display = "none";
  deniedView.style.display = "none";
  adminView.style.display = "none";

  if (!user) {
    loginView.style.display = "block";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    deniedView.style.display = "block";
    return;
  }

  adminView.style.display = "block";
  loadPosts();
});

/* ========================= AUTH ========================= */
window.doLogin = function () {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  if (!email || !password) {
    loginMsg.innerText = "❌ Remplissez les deux champs";
    return;
  }

  loginMsg.innerText = "⏳ Connexion...";

  signInWithEmailAndPassword(auth, email, password)
    .catch((err) => { loginMsg.innerText = "❌ " + err.message; });
};

window.doLogout = function () {
  signOut(auth);
};

/* ========================= CREATE ========================= */
window.addPost = async function () {
  const title = document.getElementById("title").value.trim();
  const image = document.getElementById("image").value.trim();
  const author = document.getElementById("author").value.trim();
  const content = document.getElementById("content").value.trim();

  if (!title || !content) {
    msg.innerText = "❌ Titre + contenu obligatoires";
    return;
  }

  await addDoc(collection(db, "articles"), {
    title, image, author, content,
    date: new Date().toLocaleDateString("fr-FR"),
    createdAt: serverTimestamp(), // ← utilisé pour le tri, insensible au format texte
    likes: 0, views: 0
  });

  document.getElementById("title").value = "";
  document.getElementById("image").value = "";
  document.getElementById("author").value = "";
  document.getElementById("content").value = "";

  msg.innerText = "✅ Article publié";
  loadPosts();
};

/* ========================= READ ========================= */
async function loadPosts() {
  const snap = await getDocs(collection(db, "articles"));
  list.innerHTML = "";

  if (snap.empty) {
    list.innerHTML = `<p style="color:#8c94a3;">Aucun article pour l'instant.</p>`;
    return;
  }

  snap.forEach((d) => {
    const data = d.data();
    list.innerHTML += `
      <div class="post-card">
        ${data.image ? `<img src="${escapeHTML(data.image)}" alt="">` : ""}
        <div class="post-card-body">
          <h3>${escapeHTML(data.title)}</h3>
          <p class="meta">${escapeHTML(data.author || "VifernelZ")} • ${escapeHTML(data.date || "")}</p>
          <button class="btn-edit" onclick='openEdit("${d.id}")'>✏ Modifier</button>
          <button class="btn-danger" onclick="deletePost('${d.id}')">🗑 Supprimer</button>
        </div>
      </div>
    `;
  });
}

/* ========================= DELETE ========================= */
window.deletePost = async function (id) {
  if (!confirm("Supprimer définitivement cet article ?")) return;
  await deleteDoc(doc(db, "articles", id));
  loadPosts();
};

/* ========================= UPDATE (modal) ========================= */
window.openEdit = async function (id) {
  const snap = await getDocs(collection(db, "articles"));
  const target = snap.docs.find(d => d.id === id);
  if (!target) return;

  const data = target.data();
  editingId = id;

  document.getElementById("editTitle").value = data.title || "";
  document.getElementById("editImage").value = data.image || "";
  document.getElementById("editAuthor").value = data.author || "";
  document.getElementById("editContent").value = data.content || "";

  document.getElementById("editModal").classList.add("active");
};

window.closeEdit = function () {
  document.getElementById("editModal").classList.remove("active");
  editingId = null;
};

window.saveEdit = async function () {
  if (!editingId) return;

  await updateDoc(doc(db, "articles", editingId), {
    title: document.getElementById("editTitle").value.trim(),
    image: document.getElementById("editImage").value.trim(),
    author: document.getElementById("editAuthor").value.trim(),
    content: document.getElementById("editContent").value.trim()
  });

  closeEdit();
  loadPosts();
};

/* ========================= SÉCURITÉ ========================= */
function escapeHTML(text){
  if(!text) return "";
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}
</script>

</body>
</html>
