<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Validation</title>
</head>

<body style="background:#000;color:white;display:flex;justify-content:center;align-items:center;height:100vh;">

<h2>Validation en cours...</h2>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDzr8uruU4UMNjCMa50zs4erHGXkN_fyQ",
  authDomain: "vifernel-trading-academy.firebaseapp.com",
  projectId: "vifernel-trading-academy",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let done = false;

onAuthStateChanged(auth, async (user) => {

  if (!user || done) return;
  done = true;

  const snap = await getDoc(doc(db, "users", user.uid));

  if (!snap.exists()) {
    window.location.href = "login.html";
    return;
  }

  const plan = snap.data().plan;

  // ROUTING FINAL PROPRE
  if (plan === "VIP") {
    window.location.href = "dashboard-vip.html";
  }

  else if (plan === "VVIP") {
    window.location.href = "dashboard-vvip.html";
  }

  else if (plan === "VVVIP") {
    window.location.href = "dashboard-vvvip.html";
  }

  else {
    window.location.href = "pricing.html";
  }

});

</script>

</body>
</html>
