<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement réussi - Vifernel Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.card{
  background:#111;
  padding:40px;
  border-radius:15px;
  max-width:500px;
  box-shadow:0 0 30px rgba(212,175,55,0.3);
}

h1{
  color:#d4af37;
  font-size:28px;
}

p{
  color:#aaa;
  margin-top:10px;
  line-height:1.6;
}

.plan{
  margin-top:15px;
  font-size:18px;
  color:#d4af37;
  font-weight:bold;
}

button{
  margin-top:25px;
  padding:12px 25px;
  background:#d4af37;
  color:black;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}
</style>
</head>

<body>

<div class="card">

  <h1>🎉 Paiement réussi !</h1>

  <p>
    Merci pour votre confiance.<br>
    Votre accès est en cours d’activation.
  </p>

  <!-- 💎 PLAN DYNAMIQUE -->
  <div class="plan" id="planBox">
    Chargement de votre abonnement...
  </div>

  <p>
    Vous pouvez maintenant accéder à votre espace membre.
  </p>

  <button onclick="goDashboard()">
    Accéder au dashboard
  </button>

</div>

<script>
function goDashboard(){
  window.location.href = "dashboard.html";
}

// 💎 RÉCUPÉRATION DU PLAN (IMPORTANT)
const plan = localStorage.getItem("selectedPlan");

const planBox = document.getElementById("planBox");

if(plan){
  planBox.innerHTML = "Abonnement activé : " + plan;
} else {
  planBox.innerHTML = "Abonnement activé";
}

// 🔥 nettoyage après affichage (option pro)
setTimeout(() => {
  localStorage.removeItem("selectedPlan");
}, 5000);
</script>

</body>
</html>
